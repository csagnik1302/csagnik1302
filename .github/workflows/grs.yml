name: Update profile assets

on:
  push:
    paths-ignore:
      - "profile/*.svg"
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create profile directory
        run: mkdir -p profile

      - name: Generate contribution snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            profile/snake.svg?palette=github&color_snake=%231b5e20&color_dots=%23000000,%239be9a8,%2340c463,%2330a14e,%23216e39

      - name: Commit profile assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update profile assets" || exit 0
          git push
